export default "<div class=\"container main-container\">\n\n    <div class=\"row\">\n        <div class=\"col-md-12\">\n            <div class=\"form-group\">\n                <label>Buscar:</label>\n                <input [(ngModel)]=\"search\" name=\"buscar\" (keyup.enter)=\"searchMovie()\" type=\"text\" class=\"form-control\"\n                    placeholder=\"Buscar una película\">\n            </div>\n        </div>\n       \n    </div>\n    <div class=\"row animated fadeIn fast\">\n        <div class=\"card-columns\">\n            <div class=\"card\" *ngFor=\"let mo of _msService.movies\">\n              <img class=\"card-img-top img-fluid\" [src]=\"mo|noimage\" [alt]=\"mo.original_title\">\n              <div class=\"card-block\">\n                <h4 class=\"card-title\">{{ mo.original_title }}</h4>\n                <p class=\"card-text text-justify\">{{ mo.overview | slice:0:250}}...</p>\n                <button type=\"button\"\n                [routerLink]=\"['/movie', mo.id, 'search', search]\"\n                class=\"btn btn-primary btn-block\">\n          Ver más...\n        </button>\n              </div>\n            </div>\n      \n          </div>\n    </div>\n</div>"
