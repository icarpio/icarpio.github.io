export default "<nav class=\"navbar navbar-expand-lg navbar-primary bg-primary\" style=\"color: aliceblue;\">\n    <a class=\"navbar-brand\">MoviesApp\n        <img src=\"assets/img/icon.png\" width=\"40\" height=\"40\" alt=\"\">\n    </a>\n    <button class=\"navbar-toggler\" type=\"button\" data-toggle=\"collapse\" data-target=\"#navbarNav\"\n        aria-controls=\"navbarNav\" aria-expanded=\"false\" aria-label=\"Toggle navigation\">\n        <span class=\"navbar-toggler-icon\"></span>\n    </button>\n\n\n    <ul class=\"navbar-nav mr-auto\">\n        <li class=\"nav-item\" routerLinkActive=\"active\">\n            <a class=\"nav-link\" [routerLink]=\"['home']\">Home</a>\n        </li>\n        <li class=\"nav-item\" routerLinkActive=\"active\">\n            <a class=\"nav-link\" [routerLink]=\"['search']\">Search</a>\n        </li>\n    </ul>\n    <form class=\"form-inline my-2 my-lg-0\" (ngSubmit)=\"searchMovie(searchTxt.value)\">\n        <input class=\"form-control mr-sm-2\" type=\"search\" placeholder=\"Search\" aria-label=\"Search\" #searchTxt>\n        <button class=\"btn btn-success my-2 my-sm-0\" type=\"submit\">Search</button>\n    </form>\n\n</nav>\n\n<style>\n    a {\n        color: aliceblue;\n    }\n</style>"
