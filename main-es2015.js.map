export default "<h1>{{title}}</h1>\n<div class=\"row\" *ngIf=\"movies\">\n    <div class=\"col-sm-6\">\n        <div class=\"row animated fadeIn fast\">\n            <div class=\"col-md-12 div-pic-1 puntero\" [routerLink]=\"['/movie',this.movies[0].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[0] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[0].title}}</p>\n            </div>\n        </div>\n        <div class=\"row\">\n            <div class=\"col-sm-6 div-pic-2 puntero\" [routerLink]=\"['/movie',this.movies[1].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[1] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[1].title}}</p>\n            </div>\n            <div class=\"col-sm-6 div-pic-2 puntero\" [routerLink]=\"['/movie',this.movies[2].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[2] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[2].title}}</p>\n            </div>\n        </div>\n    </div>\n    <div class=\"col-sm-6\">\n        <div class=\"row\">\n            <div class=\"col-sm-6 div-pic-2 puntero\" [routerLink]=\"['/movie',this.movies[3].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[3] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[3].title}}</p>\n            </div>\n            <div class=\"col-sm-6 div-pic-2 puntero\" [routerLink]=\"['/movie',this.movies[4].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[4] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[4].title}}</p>\n            </div>\n        </div>\n        <div class=\"row\">\n            <div class=\"col-md-12 div-pic-1 puntero\" [routerLink]=\"['/movie',this.movies[5].id, 'home']\"\n            [ngStyle]=\"{ 'background-image': 'url('+ (this.movies[5] | noimage) +')'}\">\n            <p class=\"pic-titulo\">{{movies[5].title}}</p>\n            </div>\n        </div>\n    </div>\n</div>"
