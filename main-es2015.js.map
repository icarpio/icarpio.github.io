export default "<div *ngIf=\"movie\" class=\"container main-container animated fadeIn fast\">\n    <h1>{{movie.title}}</h1>\n    <div class=\"row\">\n        <div class=\"col-md-5\">\n            <img [src]=\"movie|noimage\" [alt]=\"movie.original_title\" class=\"img-fluid img-thumbnail\">\n        </div>\n        <div class=\"col-md-7\">\n            <h3>Sinopsis</h3>\n            <hr>\n            <p class=\"text-justify\">\n                {{movie.overview}}\n            </p>\n            <p>\n                {{movie.tagline}}\n            </p>\n            <p>Popularidad:\n                <span class=\"badge badge-primary\">\n                    {{movie.popularity|number:'.2-2'}}\n                </span>\n            </p>\n            <p>Votos:\n                <span class=\"badge badge-primary\">\n                    {{movie.vote_average}}\n                </span>\n            </p>\n            <button type=\"button\" [routerLink]=\"['/'+comeBack, search]\"\n            class=\"btn btn-primary\">\n            Volver\n        </button>\n        </div>\n        \n    </div>\n</div>"
